# perry: cameras are disabled/broken in the mainline DT (camss/cci off).
# The WirePlumber libcamera monitor initialises libcamera and then dies on the
# half-present camera, taking the session manager down (repeated "Stopping
# Multimedia Service Session Manager" with a fresh instance every ~20 s). That
# flaps the ALSA audio devices in and out of PipeWire. video-capture is a
# "wants" (optional) dependency of the main profile, so disabling the libcamera
# monitor is safe and leaves audio unaffected.
#
# WirePlumber 0.5 profile-feature syntax.
wireplumber.profiles = {
  main = {
    monitor.libcamera = disabled
  }
}
