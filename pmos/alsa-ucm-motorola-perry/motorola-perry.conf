Syntax 6

# ALSA UCM2 profile for the Motorola Moto E4 (perry, XT1765) on mainline
# (postmarketOS qcom-msm89x7, card "motorola-perry" / driver "motorola-perry").
#
# UCM matches this via ucm2/conf.d/${CardDriver}/${CardDriver}.conf; perry's
# DTS sound node sets model = "motorola-perry" and no driver_name, so the ALSA
# ctl driver string falls back to the card name (14 chars, fits the 16-byte
# field) -> conf.d/motorola-perry/motorola-perry.conf.
#
# perry uses the internal msm8x16-wcd codec (ADC1-3 / RX1-3 Digital Volume /
# EAR_S / HPHL/R / SPK DAC Switch), same as its MSM8917 sibling montana and
# the potter (G5 Plus) template. We reuse the shipped potter HiFi verb, which
# includes an internal-codec Speaker device driven by the WCD SPK DAC (perry
# exposes SPK DAC Switch) plus Earpiece/Headphones/Mic1/Mic2/Headset. Every
# cset in potter/HiFi.conf + the msm8953-wcd codec sequences was verified
# present on perry's card before adopting this.

SectionUseCase."HiFi" {
	File "/Motorola/potter/HiFi.conf"
	Comment "Play and record HiFi quality Music"
}

Include.card-init.File "/lib/card-init.conf"
Include.ctl-remap.File "/lib/ctl-remap.conf"

BootSequence [
	# Speaker / Earpiece / Headphones digital volume (RX1-3)
	cset "name='RX1 Digital Volume' 84"
	cset "name='RX2 Digital Volume' 84"
	cset "name='RX3 Digital Volume' 84"

	# Microphone analog gains (ADC1-3)
	cset "name='ADC1 Volume' 6"
	cset "name='ADC2 Volume' 6"
	cset "name='ADC3 Volume' 6"
]
