name: TWRP perry

# Builds flashable TWRP 3.7.0_9-0 for XT1765/perry from manifests/twrp-perry.xml
# + patches/twrp/, then publishes to GitHub Release tag twrp-3.7.0_9-0.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "manifests/twrp-perry.xml"
      - "scripts/sync-twrp.sh"
      - "scripts/build-twrp.sh"
      - "scripts/apply-twrp-patches.sh"
      - "patches/twrp/**"
      - ".github/workflows/twrp.yml"

env:
  TWRP_DIR: ${{ github.workspace }}/android/twrp
  OUT_COPY: ${{ github.workspace }}/android/recovery
  RELEASE_TAG: twrp-3.7.0_9-0
  RELEASE_ASSET: twrp-3.7.0_9-0-perry.img
  # Micromamba / conda-forge Python 2.7 for Omni 7.1 make
  MAMBA_ROOT_PREFIX: ${{ github.workspace }}/mamba

concurrency:
  group: twrp-perry-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout xylitol
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          set -eux
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/share/swift /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL || true
          sudo apt-get clean
          df -h

      - name: Install host packages
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl wget git gnupg flex bison gperf build-essential \
            zip unzip zlib1g-dev libncurses5 libncurses5-dev \
            libssl-dev bc python3 python-is-python3 rsync schedtool \
            libxml2-utils xsltproc squashfs-tools pngcrush imagemagick \
            libsdl1.2-dev lib32z1-dev ccache
          df -h

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"

      - name: Install repo
        run: |
          set -eux
          mkdir -p "$HOME/bin"
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo \
            -o "$HOME/bin/repo"
          chmod a+x "$HOME/bin/repo"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Install Python 2.7 (micromamba)
        run: |
          set -eux
          curl -L https://micro.mamba.pm/api/micromamba/linux-64/latest \
            | tar -xj -C /tmp bin/micromamba
          mkdir -p "$MAMBA_ROOT_PREFIX"
          /tmp/bin/micromamba shell init -s bash -r "$MAMBA_ROOT_PREFIX"
          /tmp/bin/micromamba create -y -n py27 -c conda-forge python=2.7
          echo "PY27_BIN=$MAMBA_ROOT_PREFIX/envs/py27/bin" >> "$GITHUB_ENV"
          "$MAMBA_ROOT_PREFIX/envs/py27/bin/python" --version

      - name: Configure git for repo
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config --global color.ui false

      - name: Sync TWRP tree
        run: |
          set -eux
          export TWRP_DIR OUT_COPY JOBS
          JOBS="$(nproc)"
          bash scripts/sync-twrp.sh

      - name: Build recoveryimage
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          set -eux
          export TWRP_DIR OUT_COPY JOBS PY27_BIN
          JOBS="$(nproc)"
          # setup-java exports JAVA_HOME; build-twrp.sh defaults to Debian path
          bash scripts/build-twrp.sh
          ls -lh "$OUT_COPY/$RELEASE_ASSET"
          stat --format=%s "$OUT_COPY/$RELEASE_ASSET"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE_ASSET }}
          path: ${{ env.OUT_COPY }}/${{ env.RELEASE_ASSET }}
          if-no-files-found: error

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eux
          IMG="$OUT_COPY/$RELEASE_ASSET"
          SIZE=$(stat --format=%s "$IMG")
          SHA256=$(sha256sum "$IMG" | awk '{print $1}')
          BODY=$(cat <<EOF
          Flashable TWRP **3.7.0_9-0** for Motorola Moto E4 (**perry** / XT1765).

          Built from this repo's \`manifests/twrp-perry.xml\` + \`patches/twrp/\` (BoardConfig shrink so the image fits the **16 879 616**-byte recovery partition). Stock TeamWin perry builds are ~17.4 MB and only work with \`fastboot boot\`.

          | | |
          |---|---|
          | Asset | \`${RELEASE_ASSET}\` |
          | Size | ${SIZE} bytes |
          | SHA-256 | \`${SHA256}\` |
          | CI run | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} |

          ### Flash
          \`\`\`bash
          adb reboot bootloader
          fastboot flash recovery ${RELEASE_ASSET}
          # or test without flashing:
          fastboot boot ${RELEASE_ASSET}
          \`\`\`

          Do **not** wipe \`persist\`, \`modemst1\`, or \`modemst2\`.
          EOF
          )

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$IMG" \
              --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "TWRP 3.7.0_9-0 (perry)" \
              --notes "$BODY"
          else
            gh release create "$RELEASE_TAG" "$IMG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "TWRP 3.7.0_9-0 (perry)" \
              --notes "$BODY"
          fi
