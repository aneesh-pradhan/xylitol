name: lint

# Fast sanity checks for the pmaport overlay + helper scripts.
# Runs whenever packaging or scripts change (skipped for docs-only commits).
on:
  push:
    branches: [main]
    paths:
      - 'pmos/**'
      - 'scripts/**'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - 'pmos/**'
      - 'scripts/**'
      - '.github/workflows/lint.yml'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck helper scripts (error severity gates CI)
        run: shellcheck -S error scripts/*.sh

  apkbuild-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: apkbuild-lint (informational — does not fail the build)
        run: |
          docker run --rm -v "$PWD:/x" -w /x alpine:edge sh -c '
            apk add -q atools >/dev/null
            rc=0
            for f in pmos/*/APKBUILD; do
              echo "== $f =="
              apkbuild-lint "$f" || rc=0   # style warnings are advisory here
            done
            exit $rc
          '
